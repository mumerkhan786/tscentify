<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>T-SCENTIFY | Coming Soon</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

body{

background:black;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;

}

/* container */

.container{
max-width:800px;
padding:20px;
}

/* logo */

.logo{

width:220px;
margin-bottom:30px;

}

/* brand */

.brand{

font-size:48px;
font-weight:700;
letter-spacing:4px;

background: linear-gradient(90deg,#d4af37,#ffd700,#b8962e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

margin-bottom:10px;

}

/* tagline */

.tagline{

font-size:18px;
color:#d4af37;
margin-bottom:40px;

}

/* coming soon */

.title{

font-size:36px;
margin-bottom:10px;

background: linear-gradient(90deg,#d4af37,#ffd700,#b8962e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

/* description */

.desc{

font-size:18px;
color:#ccc;

}

/* footer */

.footer{

position:absolute;
bottom:20px;
width:100%;
text-align:center;
font-size:14px;
color:#777;

}

</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<div class="brand">T-SCENTIFY</div>

<div class="tagline">
Where Tareen's Legacy Becomes Fragrance
</div>

<div class="title">
Luxury Fragrance Store Coming Soon
</div>

<p class="desc">
Our premium perfume collection is being prepared.  
Stay tuned for the official launch.
</p>

</div>

<div class="footer">
© 2026 T-SCENTIFY
</div>

</body>

</html>
